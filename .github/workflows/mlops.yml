name: MLOps CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test_and_validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/仕事をこなす@v4
      with:
        python-version: '3.10'
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Model Training Pipeline
      run: |
        python train.py
        
    - name: Verify Serialized Model Artifacts
      run: |
        if [ ! -f "models/forecast_model.pkl" ]; then
          echo "Error: forecast_model.pkl not found!"
          exit 1
        fi
        if [ ! -f "models/segmentation_model.pkl" ]; then
          echo "Error: segmentation_model.pkl not found!"
          exit 1
        fi
        echo "All serialized model artifacts verified successfully!"
        
    - name: Run API Integration Tests
      run: |
        python -c "
        import app
        client = app.app.test_client()
        routes = ['/', '/api/summary', '/api/transactions', '/api/ds/forecast', '/api/ds/segmentation', '/api/ds/recommendations', '/api/ds/menu_optimizer', '/api/ds/simulate']
        for r in routes:
            status = client.get(r).status_code
            print(f'Route {r}: {status}')
            if status != 200:
                raise Exception(f'Route {r} failed with status {status}')
        "
